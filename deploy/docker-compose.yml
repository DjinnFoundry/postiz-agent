services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: unless-stopped
    environment:
      # ── Core ──
      MAIN_URL: "http://localhost:5000"
      FRONTEND_URL: "http://localhost:5000"
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:5000/api"
      JWT_SECRET: "${POSTIZ_JWT_SECRET:-change_me_in_env}"

      # ── Data ──
      DATABASE_URL: "postgresql://postgres:postiz@postgres:5432/postiz"
      REDIS_URL: "redis://redis:6379"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "false"
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"

      # ── X / Twitter ──
      X_API_KEY: "${X_API_KEY:-}"
      X_API_SECRET: "${X_API_SECRET:-}"

      # ── TikTok ──
      TIKTOK_CLIENT_ID: "${TIKTOK_CLIENT_KEY:-}"
      TIKTOK_CLIENT_SECRET: "${TIKTOK_CLIENT_SECRET:-}"

      # ── Instagram (Meta App) ──
      FACEBOOK_APP_ID: "${INSTAGRAM_APP_ID:-}"
      FACEBOOK_APP_SECRET: "${INSTAGRAM_APP_SECRET:-}"

      # ── YouTube (optional — we delegate to YouTubeCLI) ──
      YOUTUBE_CLIENT_ID: "${YOUTUBE_CLIENT_ID:-}"
      YOUTUBE_CLIENT_SECRET: "${YOUTUBE_CLIENT_SECRET:-}"

    volumes:
      - ./postiz-data/uploads:/uploads
      - ./postiz-data/config:/config
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postiz
      POSTGRES_DB: postiz
    volumes:
      - ./postiz-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: postiz-redis
    restart: unless-stopped
    volumes:
      - ./postiz-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
